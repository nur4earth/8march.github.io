<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>8 Наурыз құтты болсын!</title>
<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

#container {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

#container h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

#container p {
    font-size: 28px;
    margin: 5px 0;
}

.confetti-piece {
    position: absolute;
    width: 12px;
    height: 12px;
    background-color: #ff0;
    opacity: 0.8;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10px) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(360deg); }
}

.emoji {
    position: absolute;
    font-size: 32px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    50% { transform: translateY(-200px) rotate(180deg); opacity:0.7; }
    100% { transform: translateY(0) rotate(360deg); opacity:1; }
}
</style>
</head>
<body>

<div id="container">
    <h1 id="greeting"></h1>
    <p id="from"></p>
</div>

<script>
// URL параметрінен аты алу
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Оқушы";

// Мерекелік мәтіндер
const lines = [
    `✨ 8 Наурыз мерекесімен! ✨`,
    `💐 ${name}, сенің күнің бүгін! 💐`,
    `— Дастан ағай`
];

let i = 0;
function showLine() {
    const container = document.getElementById("container");
    if(i < lines.length){
        const el = i === 0 ? document.getElementById("greeting") : document.getElementById("from");
        el.innerText = lines[i];
        i++;
        setTimeout(showLine, 1000);
    }
}
showLine();

// Конфетти жасау
function createConfetti(){
    const colors = ["#FF0A54","#FF477E","#FF7096","#FF85A1","#FBB1B1","#F9BEC7"];
    const confetti = document.createElement("div");
    confetti.className = "confetti-piece";
    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.animationDuration = 3 + Math.random()*3 + "s";
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 6000);
}
setInterval(createConfetti, 150);

// Эмодзи гүлдер мен жүректер
const emojis = ["🌸","💖","🎀","🌺","✨"];
function createEmoji(){
    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.style.left = Math.random()*window.innerWidth + "px";
    emoji.style.top = window.innerHeight + "px";
    emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    document.body.appendChild(emoji);
    setTimeout(()=>emoji.remove(),6000);
}
setInterval(createEmoji, 300);

</script>

</body>
</html>
